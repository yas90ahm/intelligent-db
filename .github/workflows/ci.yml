name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: typecheck + test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # engines.node in package.json requires >=20; the project is developed and
        # tested on Node 24 (per README/CLAUDE.md) — cover both.
        node-version: ['20.x', '24.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        # NOTE: npm ci currently installs heavy bench-only devDependencies (duckdb, transformers,
        # qdrant, pg, redis, lmdb, better-sqlite3); splitting bench deps out is the known lever.
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
