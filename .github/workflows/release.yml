name: Release

# Tag-triggered release pipeline. Push a tag matching `vX.Y.Z` (e.g. `v0.1.0`) on
# `main` to run it. Does three things, in order: (1) re-runs the full test matrix
# against the exact commit the tag points at (never trust a tag blindly — CI on the
# commit that was tagged may have run days earlier against a different tree state
# on a force-pushed branch); (2) builds and `npm publish`es with provenance
# attached; (3) cuts a GitHub release whose body is the matching CHANGELOG.md
# excerpt.
#
# Required repo secret: `NPM_TOKEN` — an npm automation/publish token with
# publish rights on the `intelligent-db` package. This workflow does not create
# that secret; add it under Settings -> Secrets and variables -> Actions before
# the first tag push, or the publish job fails closed at the `npm publish` step
# with npm's own auth error (nothing is published without it).
#
# NOTE: `package.json` currently pins `"private": true`. `npm publish` refuses
# to publish a private package regardless of this workflow; flipping that flag
# is a deliberate product decision made separately (see
# docs/project-management/RELEASE_PROCESS.md), not something this pipeline does
# for you. Until that flag is removed, tagging and pushing is safe to rehearse —
# the publish step will simply fail with npm's "This package has been marked as
# private" error, and no GitHub release is cut (job order below is
# fail-closed: publish must succeed before the release step runs).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  test:
    name: typecheck + test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Mirrors ci.yml's floor/ceiling coverage — re-verified here rather than
        # assumed, since a tag can point at a commit CI last ran against before a
        # force-push.
        node-version: ['22.x', '24.x']
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish:
    name: build + npm publish (provenance)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for `npm publish --provenance` (OIDC signing)
    outputs:
      version: ${{ steps.pkg-version.outputs.version }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # prepublishOnly (typecheck + test + build) also runs automatically as an
      # npm publish lifecycle hook; running it explicitly first means a failure
      # surfaces as its own labeled step instead of buried inside the publish log.
      - name: Verify + build (prepublishOnly)
        run: npm run prepublishOnly

      - name: Read package version
        id: pkg-version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Fail if tag and package.json version disagree
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="${{ steps.pkg-version.outputs.version }}"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag v$tag_version does not match package.json version $pkg_version"
            exit 1
          fi

      - name: npm publish (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub release (CHANGELOG excerpt)
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the release
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Extract CHANGELOG excerpt for this version
        id: excerpt
        run: |
          node scripts/changelogExcerpt.mjs "${{ needs.publish.outputs.version }}" > release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md
